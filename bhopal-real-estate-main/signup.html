<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Account - Bhopal Properties</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; overflow-x: hidden; }
        .signup-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 40px 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255, 255, 255, 0.2); width: 100%; max-width: 420px; text-align: center; }
        .logo { font-size: 28px; font-weight: 700; color: #2c3e50; margin-bottom: 5px; }
        .logo span { color: #3498db; }
        .subtitle { color: #576574; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-weight: 600; color: #2c3e50; margin-bottom: 8px; font-size: 13px; }
        .input-group input { width: 100%; padding: 14px; border: 2px solid transparent; border-radius: 12px; font-size: 15px; transition: all 0.3s ease; outline: none; background: #f1f2f6; color: #2c3e50; font-weight: 500; }
        .input-group input:focus { border-color: #3498db; background: white; box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15); }
        .action-btn { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 10px; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.2); }
        .action-btn:hover { background: #2980b9; transform: translateY(-2px); }
        .action-btn.success { background: #27ae60; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.2); }
        .action-btn.success:hover { background: #219653; }
        .bottom-link { margin-top: 20px; font-size: 14px; color: #576574; }
        .bottom-link a { color: #2c3e50; text-decoration: none; font-weight: 700; transition: color 0.3s ease; }
        .bottom-link a:hover { color: #3498db; text-decoration: underline; }
        #messageBox { padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; display: none; font-weight: 500; text-align: center; }
        .msg-error { background: #ffeaa7; color: #d63031; border-left: 4px solid #d63031; }
        .msg-success { background: #dff9fb; color: #27ae60; border-left: 4px solid #27ae60; }
        #step2 { display: none; }
        @media (max-width: 480px) { .signup-card { padding: 25px 20px; border-radius: 20px; } .logo { font-size: 24px; } .subtitle { font-size: 13px; margin-bottom: 20px; } .input-group input { padding: 12px; font-size: 14px; } .action-btn { padding: 14px; font-size: 15px; } #otpCode { font-size: 24px !important; letter-spacing: 8px !important; } }
    </style>
</head>
<body>

    <div class="signup-card">
        <div class="logo">Create <span>Account</span> ✨</div>
        <p class="subtitle" id="formSubtitle">Register as a broker and start managing properties.</p>
        
        <div id="messageBox"></div>
        
        <form id="signupForm">
            <div id="step1">
                <div class="input-group"><label>Full Name</label><input type="text" id="name" placeholder="John Doe" required></div>
                <div class="input-group"><label>Email Address</label><input type="email" id="email" placeholder="name@example.com" required></div>
                <div class="input-group"><label>Create Password</label><input type="password" id="password" placeholder="Min 6 characters" required minlength="6"></div>
                <button type="submit" class="action-btn" id="signupBtn">Sign Up Now</button>
            </div>
        </form>

        <form id="otpForm">
            <div id="step2">
                <div class="input-group">
                    <label>Enter OTP Code</label>
                    <input type="text" id="otpCode" placeholder="••••" required autocomplete="off" maxlength="4" style="text-align: center; font-size: 28px; letter-spacing: 12px; font-weight: bold; color: #27ae60;">
                    <p style="font-size: 12px; color: #576574; margin-top: 8px; text-align: center;">* OTP has been auto-filled for testing.</p>
                </div>
                <button type="submit" class="action-btn success" id="verifyBtn">Verify Account</button>
            </div>
        </form>
        
        <div class="bottom-link">Already have an account? <a href="login.html">Log In</a></div>
    </div>

    <script>
        const msgBox = document.getElementById('messageBox');
        let userEmailForOtp = "";

        function showMessage(text, isError = false) {
            msgBox.innerHTML = text;
            msgBox.style.display = "block";
            msgBox.className = isError ? "msg-error" : "msg-success";
        }

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            btn.innerText = "Creating Account... ⏳";
            btn.style.opacity = "0.8";
            msgBox.style.display = "none";
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await res.json();
                
                if (data.success && data.requireOtp) {
                    userEmailForOtp = email;
                    document.getElementById('step1').style.display = "none";
                    document.getElementById('step2').style.display = "block";
                    
                    // 🚨 जादू: OTP स्क्रीन पर दिखाओ और डब्बे में अपने आप भर दो!
                    document.getElementById('formSubtitle').innerHTML = `Testing Mode Active!`;
                    showMessage(`✅ Your OTP is: <strong>${data.generatedOtp}</strong>`);
                    document.getElementById('otpCode').value = data.generatedOtp;
                    
                } else {
                    showMessage("❌ " + data.message, true);
                    btn.innerText = "Sign Up Now";
                    btn.style.opacity = "1";
                }
            } catch (error) {
                showMessage("❌ Server Error! Please try again.", true);
                btn.innerText = "Sign Up Now";
                btn.style.opacity = "1";
            }
        });

        document.getElementById('otpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('verifyBtn');
            btn.innerText = "Verifying... ⏳";
            btn.style.opacity = "0.8";
            msgBox.style.display = "none";
            
            const otp = document.getElementById('otpCode').value;
            
            try {
                const res = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmailForOtp, otp: otp })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    btn.innerText = "Account Created! ✅";
                    showMessage("🎉 " + data.message);
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    showMessage("❌ " + data.message, true);
                    btn.innerText = "Verify Account";
                    btn.style.opacity = "1";
                }
            } catch (error) {
                showMessage("❌ Server Error during verification.", true);
                btn.innerText = "Verify Account";
                btn.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
